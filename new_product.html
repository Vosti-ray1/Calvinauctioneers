<!-- Page Content -->
<div class="container" style="margin-top:100px;">
<div class="jumbotron">
<h1>Post a New Product</h1>
<p>Have something to auction? Add it here!</p>
</div>

<div class="well well-lg">
<form>
<div class="form-group">
<label>Product Name</label>
<input class="form-control" placeholder="Enter product name" required>
</div>

<div class="form-group">
<label>Product Category</label>
<select class="form-control" required>
<option>---Select Category---</option>
<option>Cars</option>
<option>Land</option>
<option>Plot</option>
<option>Building</option>
<option>Home</option>
</select>
</div>

<div class="form-group">
<label>Product Description</label>
<textarea class="form-control" rows="3" placeholder="Describe the product" required></textarea>
</div>

<div class="form-group">
<label>Salient Features</label>
<input class="form-control" placeholder="Enter key features separated by commas">
</div>

<div class="form-group">
<label>Upload Photo</label>
<input type="file" class="form-control">
</div>

<div class="form-group">
<label>Base Price (KES)</label>
<div class="input-group">
<span class="input-group-addon"><i class="fa fa-money"></i></span>
<input type="number" class="form-control" placeholder="Starting bid price" required>
</div>
</div>

<button type="submit" class="btn btn-warning btn-lg center-block">Submit Product</button>
</form>
</div>
